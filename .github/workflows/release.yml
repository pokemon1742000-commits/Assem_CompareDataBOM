name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows exe
        run: npm run build:win

      - name: Build license generator
        shell: powershell
        run: |
          $csc = "$env:WINDIR\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          & $csc /nologo /target:exe /out:"release\license.exe" "tools\LicenseGenerator.cs"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Inventory-Compare-Setup-*.exe
            release/Inventory-Compare-Setup-*.exe.blockmap
            release/Inventory-Compare-Portable-*.exe
            release/license.exe
            release/latest.yml
